<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Option C - Canvas Mountain Texture Motion</title><style>html,body{margin:0;min-height:100%;background:linear-gradient(135deg,#f6f2ea,#d8d0c1);font-family:system-ui,sans-serif;}.wrap{min-height:100vh;display:grid;place-items:center;padding:32px;box-sizing:border-box;}canvas{width:min(1000px,92vw);height:auto;aspect-ratio:640/426;border-radius:24px;background:transparent;}.label{position:fixed;left:24px;bottom:20px;color:#333;font-size:14px;opacity:.75;}</style></head><body><div class='wrap'><canvas id='c' width='640' height='426'></canvas></div><div class='label'>Canvas/web animation: wave reveal + parallax + organic scan mask</div><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;const imgs=['texture_1.png','texture_2.png','texture_3.png','texture_4.png'].map(n=>Object.assign(new Image(),{src:'images/'+n}));let loaded=0;imgs.forEach(img=>img.onload=()=>{loaded++;if(loaded===imgs.length)requestAnimationFrame(draw);});function smoothstep(x){x=Math.max(0,Math.min(1,x));return x*x*(3-2*x);}function drawImageMotion(img,t,seed){const scale=1.04+Math.sin(t*1.1+seed)*.025;const dw=W*scale,dh=H*scale;const dx=(W-dw)/2+Math.sin(t*.8+seed)*16;const dy=(H-dh)/2+Math.cos(t*.65+seed)*9;ctx.drawImage(img,dx,dy,dw,dh);}function makeWaveClip(progress,time,direction){ctx.beginPath();const edge=-W*.15+progress*W*1.3;let first=true;for(let y=-40;y<=H+40;y+=10){const wave=Math.sin(y/44+time*2.3)*28+Math.sin(y/15-time*3.1)*12;const x=edge+wave;if(first){ctx.moveTo(direction>0?-90:W+90,-60);ctx.lineTo(x,y);first=false;}else ctx.lineTo(x,y);}ctx.lineTo(direction>0?-90:W+90,H+60);ctx.closePath();ctx.clip();}function addScanPulse(time){ctx.save();ctx.globalCompositeOperation='source-atop';const x=(time*250%(W+180))-90;const g=ctx.createLinearGradient(x-90,0,x+90,0);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.5,'rgba(0,0,0,.18)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();}function draw(now){if(loaded<imgs.length)return;const time=now/1000,cycle=6,t=(time%cycle)/cycle,phase=Math.floor(t*4),local=t*4-phase,current=phase,next=(phase+1)%4;let p=smoothstep((local-.15)/.70),direction=phase%2===0?1:-1;ctx.clearRect(0,0,W,H);ctx.save();drawImageMotion(imgs[current],time,current+1);ctx.restore();ctx.save();makeWaveClip(p,time,direction);drawImageMotion(imgs[next],time,next+1);ctx.restore();addScanPulse(time);requestAnimationFrame(draw);}</script></body></html>
